name: Daily ETF Monitor

on:
  schedule:
    - cron: '0 12 * * *'   # UTC 12:00 = 北京时间 20:00
  workflow_dispatch:        # 允许手动触发

jobs:
  run-daily-monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 直接安装所有必要依赖（包括 scipy）
          pip install pandas numpy akshare scipy openpyxl
          # 如果存在 requirements.txt 也安装
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run daily monitor script
        run: python daily_monitor.py

      - name: Commit and push updated data files
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/ fund_flow_data/ reports/
          git diff --staged --quiet || git commit -m "Daily update from GitHub Actions [skip ci]"
          git push