name: Daily Test Run

on:
  schedule:
    # 每天早上 8 点 (UTC) 运行，对应北京时间下午 4 点
    # 如果想改时间，修改下面的时间即可
    - cron: '0 8 * * *'
  # 也支持手动触发
  workflow_dispatch:

jobs:
  run-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v3
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: 缓存 pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行测试脚本并保存日志
        run: |
          python test.py 2>&1 | tee run.log

      - name: 上传日志（可选）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: run.log
